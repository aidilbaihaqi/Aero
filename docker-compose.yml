services:
  postgres:
    image: postgres:15-alpine
    container_name: aero-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: aero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aero-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aero-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/aero
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-secret}
      CITILINK_TOKEN: ${CITILINK_TOKEN:-}
      VPS_IP: ${VPS_IP:-}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - aero-network
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${VPS_IP:-localhost}:8000
    container_name: aero-client
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aero-network
    restart: always

networks:
  aero-network:
    driver: bridge

volumes:
  postgres_data:

